<div class="page-container">
  <div class="breadcrumb">
    <a routerLink="/mis-descargas">Centro de Documentación</a> / <span>Formatos RRHH</span>
  </div>

  <div class="header-section">
    <div class="title-group">
      <h1>👥 Formatos de RRHH</h1>
      <p>Descarga las planillas oficiales para trámites de Talento Humano.</p>
    </div>
    <button class="btn-back" routerLink="/mis-descargas">Volver al Panel</button>
  </div>

  <div class="table-wrapper">
    <table class="rrhh-table">
      <thead>
        <tr>
          <th>Nombre del Formato</th>

          <th>Tamaño</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        @for (item of formats; track item.id) {
          <tr>
            <td>
              <div class="doc-cell">
                <span class="file-icon">📝</span>
                <span class="doc-title">{{ item.title }}</span>
              </div>
            </td>
            <td>{{ item.size }}</td>
            <td>
              <button class="btn-download" (click)="downloadFormat(item)">
                Descargar
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
